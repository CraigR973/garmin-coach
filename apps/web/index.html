<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Pre-mount theme apply — read stored preference (or system pref for
      // 'system'/unset) and set the html class + color-scheme before React
      // mounts. Prevents a flash of the wrong palette on cold load.
      (function () {
        try {
          var stored = localStorage.getItem('sss_theme');
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved =
            stored === 'light' ? 'light' :
            stored === 'dark' ? 'dark' :
            stored === 'system' ? (systemDark ? 'dark' : 'light') :
            'dark'; // default for first-time visitors: dark (matches ThemeContext)
          var html = document.documentElement;
          html.classList.remove('light', 'dark');
          html.classList.add(resolved);
          html.style.colorScheme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0A1314' : '#F7F8FA');
        } catch (e) { /* localStorage may be unavailable */ }
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Pinch-zoom stays enabled (WCAG 1.4.4) — inputs are 16px on mobile so
         there's no focus-zoom to suppress; the old maximum-scale/user-scalable
         lock was dropped in Batch 137. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A1314" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CheckMark" />
    <title>CheckMark</title>
    <meta name="description" content="CheckMark — a private AI fitness & sleep coach that turns your Garmin data into a daily readiness verdict. Invite-only." />
    <meta property="og:title" content="CheckMark" />
    <meta property="og:description" content="A private AI fitness & sleep coach that turns your Garmin data into a daily readiness verdict. Invite-only." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CheckMark" />
    <meta name="twitter:description" content="A private AI fitness & sleep coach that turns your Garmin data into a daily readiness verdict. Invite-only." />
    <meta name="twitter:image" content="/icon-512.png" />
    <!-- Preload the splash-critical font weight so the LCP wordmark paints
         without a render-blocking round-trip. The woff2 is self-hosted and
         precached by the service worker. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/fonts/jetbrains-mono-600.woff2"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
