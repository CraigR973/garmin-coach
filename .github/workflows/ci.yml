name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches: [main]

jobs:
  lint-api:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .

  typecheck-api:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: mypy src
        env:
          PYTHONPATH: .

  test-api:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/coach_test
      JWT_ACCESS_SECRET: ci-test-access-secret-not-used-in-prod
      JWT_REFRESH_SECRET: ci-test-refresh-secret-not-used-in-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: alembic upgrade head
      - run: pytest --cov=src --cov-report=term-missing
        env:
          PYTHONPATH: .

  migration-check:
    name: Migration check (alembic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coach_migration
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/coach_migration
          JWT_ACCESS_SECRET: ci-migration-access-secret
          JWT_REFRESH_SECRET: ci-migration-refresh-secret
      - run: alembic downgrade base
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/coach_migration
          JWT_ACCESS_SECRET: ci-migration-access-secret
          JWT_REFRESH_SECRET: ci-migration-refresh-secret

  build-web:
    name: Build web (lint + typecheck + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
        working-directory: apps/web
      - run: pnpm typecheck
        working-directory: apps/web
      - run: pnpm build
        working-directory: apps/web
        env:
          VITE_API_URL: https://placeholder.railway.app
